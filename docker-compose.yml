services:
  app:
    build:
      context: ./GestionFinances
      dockerfile: ../docker/php/Dockerfile
    container_name: gf-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./GestionFinances:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gf-network

  nginx:
    image: nginx:1.27-alpine
    container_name: gf-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./GestionFinances:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gf-network

  db:
    image: mysql:8.4
    container_name: gf-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gestion_finances
      MYSQL_USER: gf_user
      MYSQL_PASSWORD: gf_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gf-network

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: gf-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gf-network

networks:
  gf-network:
    driver: bridge
